<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a1220" />
    <meta name="description" content="Staff dashboard for National Party Westbridge." />
    <meta name="robots" content="noindex, nofollow" />
    <title>Dashboard | National Party Westbridge</title>
    <link rel="icon" href="images/national-party-logo.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Source+Sans+3:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="auth.js"></script>
    <script>
      if (!window.NPWAuth) {
        window.location.replace("login.html");
      } else if (!NPWAuth.requireAuth("login.html")) {
        /* redirect */
      }
    </script>
  </head>
  <body class="login-page admin-page">
    <header class="site-header header-enter">
      <div class="header-inner">
        <a class="logo" href="index.html">
          <img
            class="logo-img"
            src="images/national-party-logo.png"
            alt="National Party Westbridge logo."
            width="200"
            height="72"
            decoding="async"
          />
          <span class="logo-local">Westbridge</span>
        </a>
        <button
          type="button"
          class="nav-toggle"
          aria-expanded="false"
          aria-controls="site-nav"
          id="nav-toggle"
        >
          <span class="visually-hidden">Menu</span>
          <span class="nav-toggle-track" aria-hidden="true">
            <span class="nav-toggle-bar"></span>
            <span class="nav-toggle-bar"></span>
            <span class="nav-toggle-bar"></span>
          </span>
        </button>
        <nav class="nav" id="site-nav" aria-label="Admin">
          <a href="events.html">Events</a>
          <a href="announcements.html">Announcements</a>
          <a href="index.html">View site</a>
          <button type="button" class="btn btn-ghost admin-logout-btn" id="logout-btn">Log out</button>
        </nav>
      </div>
    </header>

    <main class="login-main admin-main" id="main">
      <div class="admin-wrap">
        <div class="login-panel admin-panel hero-fade">
          <p class="admin-badge">Staff</p>
          <h1 class="login-title">Dashboard</h1>
          <p class="login-lede">
            Signed in as <strong id="admin-email">…</strong>.
            <span id="admin-perms" class="admin-perms"></span>
          </p>
          <ul class="admin-actions">
            <li data-require="publish">
              <a class="btn btn-primary" href="announcements.html">Official announcements</a>
            </li>
            <li data-require="publish">
              <a class="btn btn-ghost" href="events.html">Events</a>
            </li>
            <li data-require="users">
              <a class="btn btn-ghost" href="users.html">Accounts &amp; permissions</a>
            </li>
            <li><a class="btn btn-ghost" href="index.html">Open public site</a></li>
          </ul>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="footer-inner">
        <p>&copy; <span id="year"></span> National Party Westbridge. Admin area.</p>
      </div>
    </footer>

    <script>
      document.getElementById("year").textContent = new Date().getFullYear();

      (function () {
        var s = NPWAuth.getSession();
        if (s && s.email) {
          document.getElementById("admin-email").textContent = s.email;
        }
        var permEl = document.getElementById("admin-perms");
        if (permEl && s && s.permissions) {
          var labels = NPWAuth.PERMISSION_CATALOG.filter(function (c) {
            return NPWAuth.hasPermission(s, c.id);
          }).map(function (c) {
            return c.label;
          });
          permEl.textContent =
            labels.length > 0 ? "Access: " + labels.join(" · ") + "." : "";
        }
        document.querySelectorAll(".admin-actions [data-require]").forEach(function (li) {
          var key = li.getAttribute("data-require");
          var ok = false;
          if (key === "publish") {
            ok = NPWAuth.hasPermission(s, NPWAuth.PERM_PUBLISH);
          } else if (key === "users") {
            ok = NPWAuth.hasPermission(s, NPWAuth.PERM_MANAGE_USERS);
          }
          if (!ok) li.hidden = true;
        });
        document.getElementById("logout-btn").addEventListener("click", function () {
          NPWAuth.clearSession();
          window.location.href = "login.html";
        });
      })();
    </script>
    <script src="nav.js"></script>
  </body>
</html>
